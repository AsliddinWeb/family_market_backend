<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Davomat belgilash</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- face-api.js — yuz tanish -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2d3148;
      --primary: #6366f1;
      --primary-light: rgba(99,102,241,0.15);
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --text: #f1f5f9;
      --muted: #64748b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: var(--primary);
      flex-shrink: 0;
    }
    .header-text h2 { font-size: 16px; font-weight: 600; }
    .header-text p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Status badges */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .badge.green  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge.red    { background: rgba(239,68,68,0.15);   color: var(--red); }
    .badge.amber  { background: rgba(245,158,11,0.15);  color: var(--amber); }
    .badge.purple { background: var(--primary-light);   color: var(--primary); }

    /* Camera area */
    .camera-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }
    #video, #canvas {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #canvas { display: none; }

    /* Face overlay */
    .face-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .face-oval {
      width: 60%; aspect-ratio: 3/4;
      border: 3px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
      transition: border-color 0.3s;
    }
    .face-oval.detected  { border-color: var(--green); }
    .face-oval.no-face   { border-color: var(--red); }

    /* Progress steps */
    .steps {
      display: flex; gap: 8px; align-items: center;
    }
    .step {
      flex: 1; height: 4px; border-radius: 4px;
      background: var(--border); transition: background 0.3s;
    }
    .step.done    { background: var(--green); }
    .step.active  { background: var(--primary); }

    /* Checklist */
    .check-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .check-item:last-child { border-bottom: none; }
    .check-icon {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .check-icon.ok      { background: rgba(34,197,94,0.15); }
    .check-icon.fail    { background: rgba(239,68,68,0.15); }
    .check-icon.pending { background: var(--border); }
    .check-label { font-size: 13px; flex: 1; }
    .check-value { font-size: 12px; color: var(--muted); }

    /* Button */
    .btn {
      width: 100%; padding: 14px;
      border: none; border-radius: 12px; cursor: pointer;
      font-size: 15px; font-weight: 600; letter-spacing: 0.3px;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary {
      background: var(--primary); color: #fff;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
    }

    /* Result */
    .result {
      text-align: center; padding: 24px 16px;
    }
    .result-icon { font-size: 56px; margin-bottom: 12px; }
    .result h2   { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .result p    { font-size: 14px; color: var(--muted); line-height: 1.5; }
    .result .bonus {
      margin-top: 12px; padding: 10px 16px;
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      border-radius: 10px; font-size: 14px; color: var(--green); font-weight: 600;
    }

    /* Loading spinner */
    .spinner {
      width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Alerts */
    .alert {
      padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.5;
    }
    .alert.info   { background: var(--primary-light); color: var(--primary); }
    .alert.error  { background: rgba(239,68,68,0.1);  color: var(--red); }
    .alert.success { background: rgba(34,197,94,0.1); color: var(--green); }
  </style>
</head>
<body>

<!-- ── Asosiy UI (JS tomonidan ko'rsatiladi) ── -->
<div id="app" style="display:none; flex-direction:column; gap:16px;">

  <!-- Header -->
  <div class="card">
    <div class="header">
      <div class="avatar" id="emp-avatar">?</div>
      <div class="header-text">
        <h2 id="emp-name">Yuklanmoqda...</h2>
        <p id="emp-branch">—</p>
      </div>
    </div>
    <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
      <span class="badge" id="today-status" style="display:none"></span>
      <span class="badge purple" id="off-day-badge" style="display:none">🎉 Dam olish kuni</span>
    </div>
  </div>

  <!-- Progress -->
  <div class="card">
    <div style="font-size:12px; color:var(--muted); margin-bottom:8px;">Tekshiruv bosqichlari</div>
    <div class="steps">
      <div class="step" id="step-loc"></div>
      <div class="step" id="step-face"></div>
      <div class="step" id="step-photo"></div>
    </div>
  </div>

  <!-- Camera -->
  <div class="card" id="camera-card">
    <div style="font-size:13px; color:var(--muted); margin-bottom:10px;">
      📸 Yuzingizni oval ichiga joylang
    </div>
    <div class="camera-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="face-overlay">
        <div class="face-oval" id="face-oval"></div>
      </div>
    </div>
    <div id="face-hint" class="alert info" style="margin-top:10px; display:none;"></div>
  </div>

  <!-- Checklist -->
  <div class="card" id="check-list">
    <div class="check-item">
      <div class="check-icon pending" id="icon-loc">📍</div>
      <span class="check-label">Joylashuv</span>
      <span class="check-value" id="val-loc">tekshirilmoqda...</span>
    </div>
    <div class="check-item">
      <div class="check-icon pending" id="icon-face">👤</div>
      <span class="check-label">Yuz tanish</span>
      <span class="check-value" id="val-face">kutilmoqda</span>
    </div>
    <div class="check-item">
      <div class="check-icon pending" id="icon-time">🕐</div>
      <span class="check-label">Vaqt</span>
      <span class="check-value" id="val-time">—</span>
    </div>
  </div>

  <!-- Action button -->
  <button class="btn btn-primary" id="btn-checkin" disabled onclick="submitCheckIn()">
    ✅ Kelishni qayd etish
  </button>

  <div id="error-msg" style="display:none"></div>
</div>

<!-- ── Natija ekrani ── -->
<div id="result-screen" style="display:none">
  <div class="card result">
    <div class="result-icon" id="res-icon">✅</div>
    <h2 id="res-title">Muvaffaqiyatli!</h2>
    <p id="res-msg">Kelishingiz qayd etildi.</p>
    <div class="bonus" id="res-bonus" style="display:none"></div>
    <button class="btn btn-secondary" style="margin-top:20px;" onclick="Telegram.WebApp.close()">
      Yopish
    </button>
  </div>
</div>

<!-- ── Loading ekrani ── -->
<div id="loading-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:16px;">
  <div class="spinner" style="width:40px;height:40px;border-width:3px;"></div>
  <p style="color:var(--muted); font-size:14px;">Yuklanmoqda...</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const API_BASE = '%%API_BASE%%'; // Backend deploy paytida almashtiriladi
// Development uchun: const API_BASE = 'http://localhost:8000';

const FACE_THRESHOLD  = 0.6;   // Yuz mos kelish minimal score
const FACE_MODELS_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
const state = {
  tg:           window.Telegram.WebApp,
  initData:     '',
  employeeInfo: null,
  stream:       null,
  location:     null,
  faceScore:    0,
  photoBase64:  null,
  faceModelsLoaded: false,
  refDescriptor: null,       // Referans yuz descriptor
  detectionInterval: null,
};

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
async function init() {
  state.tg.ready();
  state.tg.expand();
  state.tg.setBackgroundColor('#0f1117');
  state.tg.setHeaderColor('#0f1117');

  state.initData = state.tg.initData || '';

  // Development: initData bo'sh bo'lsa test mode
  if (!state.initData && window.location.hostname === 'localhost') {
    state.initData = 'test_mode';
  }

  if (!state.initData) {
    showError('Telegram orqali oching');
    return;
  }

  try {
    // 1. Employee ma'lumotlarini olish
    await loadEmployeeInfo();

    // 2. face-api.js modellarini yuklash (background)
    loadFaceModels();

    // 3. Geolokatsiya olish
    requestLocation();

    // 4. Kamera boshlash
    await startCamera();

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    // Vaqtni real vaqtda ko'rsatish
    updateTime();
    setInterval(updateTime, 1000);

  } catch (err) {
    showError(err.message || 'Xato yuz berdi');
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// EMPLOYEE INFO
// ═══════════════════════════════════════════════════════════════════════════
async function loadEmployeeInfo() {
  const url = `${API_BASE}/api/telegram/webapp-employee-info?init_data=${encodeURIComponent(state.initData)}`;
  const res  = await fetch(url);
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.detail || "Xodim topilmadi");
  }
  state.employeeInfo = await res.json();
  const info = state.employeeInfo;

  // Header
  const name = info.full_name || 'Xodim';
  document.getElementById('emp-avatar').textContent = name[0].toUpperCase();
  document.getElementById('emp-name').textContent   = name;
  document.getElementById('emp-branch').textContent  = info.branch?.name || '—';

  // Bugungi holat
  if (info.today_checked_in) {
    const badge = document.getElementById('today-status');
    badge.style.display = 'inline-flex';
    if (info.today_checked_out) {
      badge.className = 'badge red';
      badge.textContent = '✓ Bugun ketish ham qayd etilgan';
    } else {
      badge.className = 'badge green';
      badge.textContent = '✓ Bugun kelish qayd etilgan';
    }
  }

  // Dam olish kuni
  if (info.is_off_day) {
    document.getElementById('off-day-badge').style.display = 'inline-flex';
  }

  // Referans yuz rasmi yuklash (face verification uchun)
  if (info.face_photo_url) {
    loadReferenceDescriptor(info.face_photo_url);
  } else {
    // Referans rasm yo'q — yuz tekshiruvi o'tkazib yuboriladi
    setCheck('face', 'ok', '⚠️ Referans yo\'q — o\'tkazib yuborildi');
    state.faceScore = 1.0;
    checkAllReady();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// FACE-API.JS
// ═══════════════════════════════════════════════════════════════════════════
async function loadFaceModels() {
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODELS_URL);
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(FACE_MODELS_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(FACE_MODELS_URL);
    state.faceModelsLoaded = true;

    // Kamera orqali real-time yuz aniqlashni boshlash
    startFaceDetection();
  } catch (err) {
    console.warn('face-api yuklashda xato:', err);
    // Model yuklanmasa ham davom etamiz
    state.faceScore = 1.0;
    setCheck('face', 'ok', '⚠️ Yuz tekshiruvi yuklanmadi');
    checkAllReady();
  }
}

async function loadReferenceDescriptor(imageUrl) {
  try {
    const img = await faceapi.fetchImage(imageUrl);
    const detection = await faceapi
      .detectSingleFace(img, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks(true)
      .withFaceDescriptor();

    if (detection) {
      state.refDescriptor = detection.descriptor;
    } else {
      console.warn('Referans rasmda yuz topilmadi');
    }
  } catch (err) {
    console.warn('Referans descriptor yuklashda xato:', err);
  }
}

function startFaceDetection() {
  if (!state.faceModelsLoaded) return;

  const video = document.getElementById('video');
  const oval  = document.getElementById('face-oval');
  const hint  = document.getElementById('face-hint');

  state.detectionInterval = setInterval(async () => {
    if (!video.srcObject) return;
    try {
      const detection = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.4 }))
        .withFaceLandmarks(true)
        .withFaceDescriptor();

      if (!detection) {
        oval.className = 'face-oval no-face';
        hint.style.display = 'block';
        hint.className = 'alert error';
        hint.textContent = '😐 Yuzingizni kadrga to\'liq kiriting';
        return;
      }

      // Yuz aniqlandi
      oval.className = 'face-oval detected';

      // Referans bilan solishtirish
      if (state.refDescriptor) {
        const distance = faceapi.euclideanDistance(detection.descriptor, state.refDescriptor);
        // distance: 0 = to'liq mos, 0.6+ = mos emas
        // Score: 1 - distance (0-1 oralig'ida)
        state.faceScore = Math.max(0, 1 - distance);

        if (state.faceScore >= FACE_THRESHOLD) {
          hint.style.display = 'block';
          hint.className = 'alert success';
          hint.textContent = `✅ Yuz aniqlandi (${Math.round(state.faceScore * 100)}% mos)`;
          setCheck('face', 'ok', `${Math.round(state.faceScore * 100)}% mos`);
          checkAllReady();
        } else {
          hint.style.display = 'block';
          hint.className = 'alert error';
          hint.textContent = `⚠️ Mos kelmadi (${Math.round(state.faceScore * 100)}%). Yaxshi yorug'likda qayta urinib ko'ring`;
          setCheck('face', 'fail', `${Math.round(state.faceScore * 100)}% mos`);
        }
      } else {
        // Referans yo'q — detect qilindi, skor 1.0
        state.faceScore = 1.0;
        hint.style.display = 'block';
        hint.className = 'alert success';
        hint.textContent = '✅ Yuz aniqlandi';
        setCheck('face', 'ok', 'Aniqlandi');
        checkAllReady();
      }
    } catch (err) {
      // Silent
    }
  }, 1000);
}

// ═══════════════════════════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════════════════════════
async function startCamera() {
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false,
    });
    const video = document.getElementById('video');
    video.srcObject = state.stream;
    await video.play();
  } catch (err) {
    throw new Error('Kamera ruxsati berilmadi. Sozlamalardan ruxsat bering');
  }
}

function capturePhoto() {
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  // JPEG, 85% sifat
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  state.photoBase64 = dataUrl.split(',')[1]; // base64 only
}

// ═══════════════════════════════════════════════════════════════════════════
// GEOLOCATION
// ═══════════════════════════════════════════════════════════════════════════
function requestLocation() {
  if (!navigator.geolocation) {
    setCheck('loc', 'fail', 'GPS qo\'llab-quvvatlanmaydi');
    return;
  }

  setCheck('loc', 'pending', 'aniqlanmoqda...');

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.location = {
        latitude:  pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy:  pos.coords.accuracy,
      };

      // Filial radiusini tekshirish (preview)
      const branch = state.employeeInfo?.branch;
      if (branch?.latitude && branch?.longitude) {
        const dist = haversine(
          state.location.latitude, state.location.longitude,
          branch.latitude, branch.longitude,
        );
        const inside = dist <= branch.radius_meters;
        if (inside) {
          setCheck('loc', 'ok', `${Math.round(dist)}m (✓ radius ichida)`);
        } else {
          setCheck('loc', 'fail', `${Math.round(dist)}m (filialdan uzoq, max: ${branch.radius_meters}m)`);
        }
      } else {
        setCheck('loc', 'ok', `${pos.coords.accuracy.toFixed(0)}m aniqlik`);
      }

      document.getElementById('step-loc').className = 'step done';
      checkAllReady();
    },
    (err) => {
      setCheck('loc', 'fail', 'Joylashuv ruxsati berilmadi');
      // Geolocation yo'q bo'lsa ham davom etishga ruxsat berish (optional)
      state.location = { latitude: 0, longitude: 0, accuracy: 0 };
      checkAllReady();
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const phi1 = lat1 * Math.PI / 180, phi2 = lat2 * Math.PI / 180;
  const dphi = (lat2 - lat1) * Math.PI / 180;
  const dlam = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dphi/2)**2 + Math.cos(phi1)*Math.cos(phi2)*Math.sin(dlam/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

// ═══════════════════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function setCheck(key, status, value) {
  const icon  = document.getElementById(`icon-${key}`);
  const val   = document.getElementById(`val-${key}`);
  const icons = { loc: '📍', face: '👤', time: '🕐' };

  icon.textContent = icons[key];
  val.textContent  = value || '';

  icon.className = `check-icon ${status}`;
  if (status === 'ok')      { icon.style.background = 'rgba(34,197,94,0.15)'; }
  else if (status === 'fail') { icon.style.background = 'rgba(239,68,68,0.15)'; }
  else { icon.style.background = 'var(--border)'; }
}

function updateTime() {
  const now = new Date();
  const h   = String(now.getHours()).padStart(2, '0');
  const m   = String(now.getMinutes()).padStart(2, '0');
  const s   = String(now.getSeconds()).padStart(2, '0');
  setCheck('time', 'ok', `${h}:${m}:${s}`);
  document.getElementById('step-photo').className = 'step active';
}

function checkAllReady() {
  const locOk  = state.location !== null;
  const faceOk = state.faceScore >= FACE_THRESHOLD;
  const btn = document.getElementById('btn-checkin');
  btn.disabled = !(locOk && faceOk);

  if (faceOk) document.getElementById('step-face').className = 'step done';
}

function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.body.innerHTML += `
    <div class="card" style="margin-top:40px; text-align:center;">
      <div style="font-size:48px; margin-bottom:12px;">❌</div>
      <h2 style="margin-bottom:8px;">Xato</h2>
      <p style="color:var(--muted); font-size:14px;">${msg}</p>
      <button class="btn btn-secondary" style="margin-top:16px;" onclick="Telegram.WebApp.close()">
        Yopish
      </button>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════════════════════════════════
async function submitCheckIn() {
  const btn = document.getElementById('btn-checkin');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Yuklanmoqda...';

  // Foto olish
  capturePhoto();

  // Kamerani to'xtatish
  if (state.stream) {
    state.stream.getTracks().forEach(t => t.stop());
  }
  if (state.detectionInterval) {
    clearInterval(state.detectionInterval);
  }

  try {
    const body = {
      init_data:       state.initData,
      photo_base64:    state.photoBase64,
      latitude:        state.location?.latitude  || 0,
      longitude:       state.location?.longitude || 0,
      face_match_score: state.faceScore,
    };

    const res = await fetch(`${API_BASE}/api/telegram/webapp-checkin`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });

    const data = await res.json();

    if (!res.ok) {
      btn.disabled = false;
      btn.innerHTML = '✅ Kelishni qayd etish';
      showInlineError(data.detail || 'Xato yuz berdi');
      return;
    }

    // Natija ekranini ko'rsatish
    showResult(data);

  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = '✅ Kelishni qayd etish';
    showInlineError('Tarmoq xatosi. Internetni tekshiring');
  }
}

function showInlineError(msg) {
  const el = document.getElementById('error-msg');
  el.style.display = 'block';
  el.className = 'alert error';
  el.textContent = `⚠️ ${msg}`;
}

function showResult(data) {
  document.getElementById('app').style.display = 'none';
  const screen = document.getElementById('result-screen');
  screen.style.display = 'flex';
  screen.style.flexDirection = 'column';

  const icons = {
    present: '✅',
    late:    '⏰',
    holiday: '🎉',
  };

  const titles = {
    present: 'Muvaffaqiyatli!',
    late:    `Kech qoldingiz`,
    holiday: 'Dam olish kunida keldingiz!',
  };

  const msgs = {
    present: 'Kelishingiz o\'z vaqtida qayd etildi.',
    late:    `${data.late_minutes} daqiqa kechikdingiz.`,
    holiday: 'Bugun dam olish kuni. Ishlash uchun bonus hisoblandi.',
  };

  document.getElementById('res-icon').textContent  = icons[data.status]  || '✅';
  document.getElementById('res-title').textContent = titles[data.status] || 'Qayd etildi';
  document.getElementById('res-msg').textContent   = msgs[data.status]   || data.message;

  if (data.bonus_amount) {
    const bonusEl = document.getElementById('res-bonus');
    bonusEl.style.display = 'block';
    bonusEl.textContent   = `💰 Bonus: ${data.bonus_amount}`;
  }

  if (data.distance_meters !== null && data.distance_meters !== undefined) {
    document.getElementById('res-msg').textContent +=
      ` (Filialdan ${Math.round(data.distance_meters)}m)`;
  }

  // 3 soniyadan keyin avtomatik yopish
  setTimeout(() => state.tg.close(), 3500);
}

// ═══════════════════════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════════════════════
init().catch(err => showError(err.message));
</script>
