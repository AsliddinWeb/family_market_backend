<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Davomat belgilash</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f1117;
      --card:         #1a1d27;
      --border:       #2d3148;
      --primary:      #6366f1;
      --primary-light:rgba(99,102,241,0.15);
      --green:        #22c55e;
      --red:          #ef4444;
      --amber:        #f59e0b;
      --text:         #f1f5f9;
      --muted:        #64748b;
      /* Mode renkler */
      --mode-color:   #6366f1;
      --mode-bg:      rgba(99,102,241,0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    /* ── Mode banner ── */
    .mode-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--mode-bg);
      border: 1px solid var(--mode-color);
      font-size: 15px;
      font-weight: 600;
      color: var(--mode-color);
    }
    .mode-banner .mode-icon { font-size: 22px; }

    /* ── Header ── */
    .header { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: var(--primary);
      flex-shrink: 0;
    }
    .header-text h2 { font-size: 16px; font-weight: 600; }
    .header-text p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
    }
    .badge.green  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge.red    { background: rgba(239,68,68,0.15);   color: var(--red); }
    .badge.amber  { background: rgba(245,158,11,0.15);  color: var(--amber); }
    .badge.purple { background: var(--primary-light);   color: var(--primary); }

    /* ── Masofa badge ── */
    .distance-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 10px;
      font-size: 13px; font-weight: 500; margin-top: 10px;
    }
    .distance-badge.inside  { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .distance-badge.outside { background: rgba(239,68,68,0.12); color: var(--red);   border: 1px solid rgba(239,68,68,0.3); }
    .distance-badge.loading { background: var(--border);         color: var(--muted); }

    /* ── Camera ── */
    .camera-wrapper {
      position: relative; width: 100%;
      aspect-ratio: 4/3; border-radius: 12px;
      overflow: hidden; background: #000;
    }
    #video, #canvas { width: 100%; height: 100%; object-fit: cover; }
    #canvas { display: none; }
    .face-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .face-oval {
      width: 60%; aspect-ratio: 3/4;
      border: 3px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
      transition: border-color 0.3s;
    }
    .face-oval.detected { border-color: var(--green); }
    .face-oval.no-face  { border-color: var(--red); }

    /* ── Steps ── */
    .steps { display: flex; gap: 8px; align-items: center; }
    .step {
      flex: 1; height: 4px; border-radius: 4px;
      background: var(--border); transition: background 0.3s;
    }
    .step.done   { background: var(--green); }
    .step.active { background: var(--primary); }

    /* ── Checklist ── */
    .check-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .check-item:last-child { border-bottom: none; }
    .check-icon {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; background: var(--border);
    }
    .check-icon.ok   { background: rgba(34,197,94,0.15); }
    .check-icon.fail { background: rgba(239,68,68,0.15); }
    .check-label { font-size: 13px; flex: 1; }
    .check-value { font-size: 12px; color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 14px;
      border: none; border-radius: 12px; cursor: pointer;
      font-size: 15px; font-weight: 600; letter-spacing: 0.3px;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: var(--mode-color); color: #fff; }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
    }
    .btn-danger { background: var(--red); color: #fff; }

    /* ── Confirm modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; padding: 16px;
    }
    .modal-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 24px; width: 100%; max-width: 420px;
      text-align: center;
    }
    .modal-icon { font-size: 42px; margin-bottom: 12px; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .modal-msg { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { padding: 12px; font-size: 14px; }

    /* ── Result ── */
    .result { text-align: center; padding: 24px 16px; }
    .result-icon { font-size: 56px; margin-bottom: 12px; }
    .result h2   { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .result p    { font-size: 14px; color: var(--muted); line-height: 1.5; }
    .result .bonus {
      margin-top: 12px; padding: 10px 16px;
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      border-radius: 10px; font-size: 14px; color: var(--green); font-weight: 600;
    }
    .result-distance {
      margin-top: 10px; padding: 8px 14px;
      border-radius: 10px; font-size: 13px; font-weight: 500;
    }
    .result-distance.inside  { background: rgba(34,197,94,0.1); color: var(--green); }
    .result-distance.outside { background: rgba(239,68,68,0.1);  color: var(--red); }

    /* ── Spinner ── */
    .spinner {
      width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alerts ── */
    .alert {
      padding: 10px 14px; border-radius: 10px;
      font-size: 13px; line-height: 1.5;
    }
    .alert.info    { background: var(--primary-light); color: var(--primary); }
    .alert.error   { background: rgba(239,68,68,0.1);  color: var(--red); }
    .alert.success { background: rgba(34,197,94,0.1);  color: var(--green); }
    .alert.warning { background: rgba(245,158,11,0.1); color: var(--amber); }
  </style>
</head>
<body>

<!-- ══ Asosiy UI ══════════════════════════════════════════════════════════ -->
<div id="app" style="display:none; flex-direction:column; gap:16px;">

  <!-- Mode banner -->
  <div class="mode-banner" id="mode-banner">
    <span class="mode-icon" id="mode-icon">📥</span>
    <span id="mode-label">Kelishni qayd etish</span>
  </div>

  <!-- Header: xodim ma'lumotlari -->
  <div class="card">
    <div class="header">
      <div class="avatar" id="emp-avatar">?</div>
      <div class="header-text">
        <h2 id="emp-name">Yuklanmoqda...</h2>
        <p id="emp-branch">—</p>
      </div>
    </div>
    <div style="margin-top:10px;">
      <!-- Bugungi holat badge -->
      <span class="badge" id="today-status" style="display:none"></span>
      <span class="badge purple" id="off-day-badge" style="display:none">🎉 Dam olish kuni</span>
    </div>
    <!-- Masofa badge -->
    <div class="distance-badge loading" id="distance-badge">
      <span>📍</span><span id="distance-text">Joylashuv aniqlanmoqda...</span>
    </div>
  </div>

  <!-- Progress steps -->
  <div class="card">
    <div style="font-size:12px; color:var(--muted); margin-bottom:8px;">Tekshiruv bosqichlari</div>
    <div class="steps">
      <div class="step" id="step-loc"></div>
      <div class="step" id="step-face"></div>
      <div class="step" id="step-photo"></div>
    </div>
  </div>

  <!-- Kamera -->
  <div class="card" id="camera-card">
    <div style="font-size:13px; color:var(--muted); margin-bottom:10px;">
      📸 Yuzingizni oval ichiga joylang
    </div>
    <div class="camera-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="face-overlay">
        <div class="face-oval" id="face-oval"></div>
      </div>
    </div>
    <div id="face-hint" class="alert info" style="margin-top:10px; display:none;"></div>
  </div>

  <!-- Checklist -->
  <div class="card">
    <div class="check-item">
      <div class="check-icon" id="icon-loc">📍</div>
      <span class="check-label">Joylashuv</span>
      <span class="check-value" id="val-loc">tekshirilmoqda...</span>
    </div>
    <div class="check-item">
      <div class="check-icon" id="icon-face">👤</div>
      <span class="check-label">Yuz tanish</span>
      <span class="check-value" id="val-face">kutilmoqda</span>
    </div>
    <div class="check-item">
      <div class="check-icon" id="icon-time">🕐</div>
      <span class="check-label">Vaqt</span>
      <span class="check-value" id="val-time">—</span>
    </div>
  </div>

  <!-- Submit tugma -->
  <button class="btn btn-primary" id="btn-submit" disabled onclick="onSubmitClick()">
    ✅ Qayd etish
  </button>

  <div id="error-msg" style="display:none;"></div>
</div>

<!-- ══ Qayta qayd etish ogohlantirish modal ═══════════════════════════════ -->
<div class="modal-overlay" id="confirm-modal" style="display:none;">
  <div class="modal-box">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title" id="confirm-title">Diqqat!</div>
    <div class="modal-msg" id="confirm-msg">Siz bugun allaqachon qayd etgansiz.</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeConfirmModal()">❌ Bekor qilish</button>
      <button class="btn btn-danger" onclick="confirmSubmit()">✅ Ha, yangilash</button>
    </div>
  </div>
</div>

<!-- ══ Natija ekrani ═══════════════════════════════════════════════════════ -->
<div id="result-screen" style="display:none;">
  <div class="card result">
    <div class="result-icon" id="res-icon">✅</div>
    <h2 id="res-title">Muvaffaqiyatli!</h2>
    <p id="res-msg"></p>
    <div id="res-distance" style="display:none;" class="result-distance"></div>
    <div class="bonus" id="res-bonus" style="display:none;"></div>
    <button class="btn btn-secondary" style="margin-top:20px;" onclick="Telegram.WebApp.close()">
      Yopish
    </button>
  </div>
</div>

<!-- ══ Loading ekrani ════════════════════════════════════════════════════ -->
<div id="loading-screen" style="display:flex; flex-direction:column; align-items:center;
     justify-content:center; min-height:60vh; gap:16px;">
  <div class="spinner" style="width:40px; height:40px; border-width:3px;"></div>
  <p style="color:var(--muted); font-size:14px;">Yuklanmoqda...</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const API_BASE        = '%%API_BASE%%';
const FACE_THRESHOLD  = 0.6;
const FACE_MODELS_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';

// ═══════════════════════════════════════════════════════════════════════════
// MODE — URL dan o'qiladi: ?mode=checkin yoki ?mode=checkout
// ═══════════════════════════════════════════════════════════════════════════
const MODE = new URLSearchParams(window.location.search).get('mode') === 'checkout'
  ? 'checkout'
  : 'checkin';   // default: checkin

const MODE_CONFIG = {
  checkin: {
    icon:       '📥',
    label:      'Kelishni qayd etish',
    btnText:    '📥 Kelishni qayd etish',
    color:      '#6366f1',
    colorBg:    'rgba(99,102,241,0.15)',
    apiPath:    '/api/telegram/webapp-checkin',
    resIcon:    { present: '✅', late: '⏰', holiday: '🎉' },
    resTitle:   { present: 'Kelish qayd etildi!', late: 'Kech keldingiz', holiday: 'Dam olish kunida keldingiz!' },
    resMsg:     { present: "Kelishingiz o'z vaqtida qayd etildi.", late: (m) => `${m} daqiqa kechikdingiz.`, holiday: 'Bugun dam olish kuni. Bonus hisoblandi.' },
  },
  checkout: {
    icon:       '📤',
    label:      'Ketishni qayd etish',
    btnText:    '📤 Ketishni qayd etish',
    color:      '#f59e0b',
    colorBg:    'rgba(245,158,11,0.15)',
    apiPath:    '/api/telegram/webapp-checkout',
    resIcon:    { default: '👋' },
    resTitle:   { default: 'Ketish qayd etildi!' },
    resMsg:     { default: (t) => `Ketish vaqti: ${t}` },
  },
};

const CFG = MODE_CONFIG[MODE];

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
const state = {
  tg:                window.Telegram.WebApp,
  initData:          '',
  employeeInfo:      null,
  stream:            null,
  location:          null,
  distanceMeters:    null,
  faceScore:         0,
  photoBase64:       null,
  faceModelsLoaded:  false,
  refDescriptor:     null,
  detectionInterval: null,
  alreadyDone:       false,   // bugun allaqachon qayd etilganmi
  existingTime:      null,    // mavjud vaqt (ogohlantirish uchun)
  force:             false,   // True → geofence bypass + qayta yozish
};

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
async function init() {
  // Mode UI ni sozlash
  applyModeUI();

  state.tg.ready();
  state.tg.expand();
  state.tg.setBackgroundColor('#0f1117');
  state.tg.setHeaderColor('#0f1117');

  state.initData = state.tg.initData || '';
  if (!state.initData && window.location.hostname === 'localhost') {
    state.initData = 'test_mode';
  }
  if (!state.initData) {
    showFatalError('Telegram orqali oching');
    return;
  }

  try {
    await loadEmployeeInfo();
    loadFaceModels();         // background
    requestLocation();
    try {
      await startCamera();
    } catch (err) {
      // __camera_denied__ — showCameraPermissionError allaqachon chaqirilgan
      if (err.message !== '__camera_denied__') throw err;
    }

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    updateTime();
    setInterval(updateTime, 1000);
  } catch (err) {
    showFatalError(err.message || 'Xato yuz berdi');
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// MODE UI
// ═══════════════════════════════════════════════════════════════════════════
function applyModeUI() {
  document.getElementById('mode-icon').textContent  = CFG.icon;
  document.getElementById('mode-label').textContent = CFG.label;
  document.getElementById('btn-submit').textContent  = CFG.btnText;

  // CSS variables ni override
  document.documentElement.style.setProperty('--mode-color', CFG.color);
  document.documentElement.style.setProperty('--mode-bg',    CFG.colorBg);
}

// ═══════════════════════════════════════════════════════════════════════════
// EMPLOYEE INFO
// ═══════════════════════════════════════════════════════════════════════════
async function loadEmployeeInfo() {
  const url = `${API_BASE}/api/telegram/webapp-employee-info?init_data=${encodeURIComponent(state.initData)}`;
  const res  = await fetch(url);
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.detail || 'Xodim topilmadi');
  }
  state.employeeInfo = await res.json();
  const info = state.employeeInfo;

  // Header
  const name = info.full_name || 'Xodim';
  document.getElementById('emp-avatar').textContent = name[0].toUpperCase();
  document.getElementById('emp-name').textContent   = name;
  document.getElementById('emp-branch').textContent = info.branch?.name || '—';

  // Dam olish kuni
  if (info.is_off_day) {
    document.getElementById('off-day-badge').style.display = 'inline-flex';
  }

  // Bugungi holat + qayta qayd ogohlantirish
  if (MODE === 'checkin') {
    if (info.today_checked_in) {
      state.alreadyDone   = true;
      state.existingTime  = info.today_check_in_time;
      const badge = document.getElementById('today-status');
      badge.style.display = 'inline-flex';
      badge.className     = 'badge amber';
      badge.textContent   = `⚠️ Kelish allaqachon qayd etilgan: ${formatTime(info.today_check_in_time)}`;
    }
  } else {
    // checkout mode
    if (!info.today_checked_in) {
      throw new Error("Siz bugun kelishni qayd etmadingiz. Avval kelishni qayd eting.");
    }
    if (info.today_checked_out) {
      state.alreadyDone   = true;
      state.existingTime  = info.today_check_out_time;
    }
    // Kelish vaqtini ko'rsatish
    const badge = document.getElementById('today-status');
    badge.style.display = 'inline-flex';
    badge.className     = 'badge green';
    badge.textContent   = `✅ Kelish: ${formatTime(info.today_check_in_time)}`;

    if (info.today_checked_out) {
      const badge2 = document.createElement('span');
      badge2.className     = 'badge amber';
      badge2.style.marginLeft = '6px';
      badge2.textContent   = `⚠️ Ketish: ${formatTime(info.today_check_out_time)}`;
      badge.parentElement.appendChild(badge2);
    }
  }

  // Yuz referans
  if (info.face_photo_url) {
    loadReferenceDescriptor(info.face_photo_url);
  } else {
    setCheck('face', 'ok', "⚠️ Referans yo'q — o'tkazib yuborildi");
    state.faceScore = 1.0;
    checkAllReady();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// FACE-API.JS
// ═══════════════════════════════════════════════════════════════════════════
async function loadFaceModels() {
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODELS_URL);
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(FACE_MODELS_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(FACE_MODELS_URL);
    state.faceModelsLoaded = true;
    startFaceDetection();
  } catch {
    state.faceScore = 1.0;
    setCheck('face', 'ok', "⚠️ Yuz tekshiruvi yuklanmadi");
    checkAllReady();
  }
}

async function loadReferenceDescriptor(imageUrl) {
  try {
    const img       = await faceapi.fetchImage(imageUrl);
    const detection = await faceapi
      .detectSingleFace(img, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks(true)
      .withFaceDescriptor();
    if (detection) state.refDescriptor = detection.descriptor;
  } catch { /* silent */ }
}

function startFaceDetection() {
  const video = document.getElementById('video');
  const oval  = document.getElementById('face-oval');
  const hint  = document.getElementById('face-hint');

  state.detectionInterval = setInterval(async () => {
    if (!video.srcObject) return;
    try {
      const detection = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.4 }))
        .withFaceLandmarks(true)
        .withFaceDescriptor();

      if (!detection) {
        oval.className       = 'face-oval no-face';
        hint.style.display   = 'block';
        hint.className       = 'alert error';
        hint.textContent     = "😐 Yuzingizni kadrga to'liq kiriting";
        return;
      }

      oval.className = 'face-oval detected';

      if (state.refDescriptor) {
        const distance    = faceapi.euclideanDistance(detection.descriptor, state.refDescriptor);
        state.faceScore   = Math.max(0, 1 - distance);
        const pct         = Math.round(state.faceScore * 100);

        if (state.faceScore >= FACE_THRESHOLD) {
          hint.style.display  = 'block';
          hint.className      = 'alert success';
          hint.textContent    = `✅ Yuz aniqlandi (${pct}% mos)`;
          setCheck('face', 'ok', `${pct}% mos`);
          document.getElementById('step-face').className = 'step done';
          checkAllReady();
        } else {
          hint.style.display  = 'block';
          hint.className      = 'alert error';
          hint.textContent    = `⚠️ Mos kelmadi (${pct}%). Yaxshi yorug'likda qayta urinib ko'ring`;
          setCheck('face', 'fail', `${pct}%`);
        }
      } else {
        state.faceScore = 1.0;
        hint.style.display  = 'block';
        hint.className      = 'alert success';
        hint.textContent    = '✅ Yuz aniqlandi';
        setCheck('face', 'ok', 'Aniqlandi');
        document.getElementById('step-face').className = 'step done';
        checkAllReady();
      }
    } catch { /* silent */ }
  }, 1000);
}

// ═══════════════════════════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════════════════════════
async function startCamera() {
  // Android Telegram WebApp da ba'zan kamera bloklangan bo'ladi —
  // avval permission query qilamiz, keyin stream olamiz
  const constraints = [
    { video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false },
    { video: { facingMode: 'user' }, audio: false },
    { video: { width: { ideal: 640 } }, audio: false },
    { video: true, audio: false },
  ];

  let lastErr;
  for (const c of constraints) {
    try {
      state.stream = await navigator.mediaDevices.getUserMedia(c);
      const video  = document.getElementById('video');
      video.srcObject = state.stream;
      await video.play();
      hideCameraError();
      return;
    } catch (err) {
      lastErr = err;
    }
  }

  // Barcha urinishlar muvaffaqiyatsiz — ruxsat so'rash tugmasini ko'rsat
  showCameraPermissionError(lastErr);
  throw new Error('__camera_denied__'); // init() da fatal error sifatida ko'rinmasin
}

function showCameraPermissionError(err) {
  const isdenial = err && (
    err.name === 'NotAllowedError' ||
    err.name === 'PermissionDeniedError' ||
    err.name === 'SecurityError'
  );

  const cameraCard = document.getElementById('camera-card');
  cameraCard.innerHTML = `
    <div style="text-align:center; padding: 20px 0;">
      <div style="font-size:48px; margin-bottom:12px;">📷</div>
      <p style="font-size:14px; font-weight:600; margin-bottom:6px; color:var(--text);">
        Kamera ${isdenial ? 'ruxsati berilmadi' : 'topilmadi'}
      </p>
      <p style="font-size:12px; color:var(--muted); margin-bottom:16px; line-height:1.5;">
        ${isdenial
          ? 'Telegram sozlamalaridan kamera ruxsatini bering, keyin qayta urinib ko\'ring'
          : 'Qurilmangizda kamera ishlamayapti yoki band'}
      </p>
      <button
        class="btn btn-primary"
        style="width:auto; padding: 10px 24px; margin: 0 auto; gap:8px;"
        onclick="retryCameraPermission()"
      >
        📷 Ruxsat berish
      </button>
    </div>
  `;

  // Face check ni skip — kamera yo'q bo'lsa yuz tekshiruvini o'tkazib yuboramiz
  state.faceScore = 1.0;
  setCheck('face', 'ok', "⚠️ Kamera yo'q — o'tkazildi");
  document.getElementById('step-face').className = 'step done';
  checkAllReady();
}

function hideCameraError() {
  // Agar kamera card qayta render qilingan bo'lsa — hech narsa qilmaymiz
}

async function retryCameraPermission() {
  const cameraCard = document.getElementById('camera-card');
  cameraCard.innerHTML = `
    <div style="text-align:center; padding:20px;">
      <div class="spinner" style="width:32px;height:32px;border-width:3px; margin:0 auto 12px;"></div>
      <p style="font-size:13px; color:var(--muted);">Kamera ulanmoqda...</p>
    </div>
  `;

  try {
    await startCamera();
    // Muvaffaqiyatli — camera card ni qayta tiklaymiz
    const cameraCard2 = document.getElementById('camera-card');
    cameraCard2.innerHTML = `
      <div style="font-size:13px; color:var(--muted); margin-bottom:10px;">
        📸 Yuzingizni oval ichiga joylang
      </div>
      <div class="camera-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="face-overlay">
          <div class="face-oval" id="face-oval"></div>
        </div>
      </div>
      <div id="face-hint" class="alert info" style="margin-top:10px; display:none;"></div>
    `;
    const video = document.getElementById('video');
    video.srcObject = state.stream;
    await video.play();

    // Face detection ni qayta ishga tushiramiz
    if (state.faceModelsLoaded) startFaceDetection();

  } catch (err) {
    if (err.message !== '__camera_denied__') {
      showCameraPermissionError(err);
    }
  }
}

function capturePhoto() {
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl        = canvas.toDataURL('image/jpeg', 0.85);
  state.photoBase64    = dataUrl.split(',')[1];
}

function stopCamera() {
  if (state.stream)            state.stream.getTracks().forEach(t => t.stop());
  if (state.detectionInterval) clearInterval(state.detectionInterval);
}

// ═══════════════════════════════════════════════════════════════════════════
// GEOLOCATION — masofa hisoblash va badge
// ═══════════════════════════════════════════════════════════════════════════
function requestLocation() {
  if (!navigator.geolocation) {
    setCheck('loc', 'fail', "GPS qo'llab-quvvatlanmaydi");
    updateDistanceBadge(null);
    // GPS yo'q bo'lsa ham davom etishga ruxsat
    state.location = { latitude: 0, longitude: 0, accuracy: 0 };
    checkAllReady();
    return;
  }
  setCheck('loc', 'pending', 'aniqlanmoqda...');

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.location = {
        latitude:  pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy:  pos.coords.accuracy,
      };

      const branch = state.employeeInfo?.branch;
      if (branch?.latitude && branch?.longitude) {
        const dist   = haversine(state.location.latitude, state.location.longitude, branch.latitude, branch.longitude);
        const radius = branch.radius_meters || 200;
        state.distanceMeters = dist;

        if (dist <= radius) {
          setCheck('loc', 'ok', `Ofis qamrovida`);
        } else {
          setCheck('loc', 'ok', `${Math.round(dist)} m uzoqda`);
        }
        updateDistanceBadge(dist, radius);
      } else {
        setCheck('loc', 'ok', `${pos.coords.accuracy.toFixed(0)} m aniqlik`);
        updateDistanceBadge(null);
      }

      hideLocationError();
      document.getElementById('step-loc').className = 'step done';
      checkAllReady();
    },
    (err) => {
      const isDenied = err.code === 1; // PERMISSION_DENIED
      showLocationPermissionError(isDenied);
      updateDistanceBadge(null);
      // Lokatsiya yo'q bo'lsa ham davom etishga ruxsat (force bilan yuboriladi)
      state.location = { latitude: 0, longitude: 0, accuracy: 0 };
      checkAllReady();
    },
    { timeout: 10000, enableHighAccuracy: true },
  );
}

function showLocationPermissionError(isDenied) {
  setCheck('loc', 'fail', isDenied ? 'Ruxsat berilmadi' : 'Aniqlanmadi');

  // Check list dagi loc qatoriga retry tugma qo'shamiz
  const locRow = document.getElementById('icon-loc')?.closest('.check-item');
  if (!locRow) return;

  // Avvalgi retry tugmasini olib tashlaymiz
  locRow.querySelector('.loc-retry-btn')?.remove();

  if (isDenied) {
    const btn = document.createElement('button');
    btn.className = 'loc-retry-btn';
    btn.style.cssText = `
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 8px; border: none; cursor: pointer;
      background: var(--primary); color: #fff; font-size: 12px; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
    `;
    btn.innerHTML = '📍 Ruxsat berish';
    btn.onclick = retryLocationPermission;
    locRow.appendChild(btn);
  }
}

function hideLocationError() {
  document.getElementById('icon-loc')
    ?.closest('.check-item')
    ?.querySelector('.loc-retry-btn')
    ?.remove();
}

function retryLocationPermission() {
  // Geolocation API da programmatic ruxsat yo'q —
  // qayta so'rov yuboramiz, foydalanuvchi accept qilishi kerak
  setCheck('loc', 'pending', 'aniqlanmoqda...');
  hideLocationError();
  requestLocation();
}

function updateDistanceBadge(dist, radius) {
  const badge = document.getElementById('distance-badge');
  const text  = document.getElementById('distance-text');

  if (dist === null || dist === undefined) {
    badge.className = 'distance-badge loading';
    text.textContent = "Joylashuv aniqlanmoqda...";
    return;
  }

  const r = radius || state.employeeInfo?.branch?.radius_meters || 200;
  if (dist <= r) {
    badge.className  = 'distance-badge inside';
    text.textContent = `✅ Ofis qamrovida (${Math.round(dist)} m)`;
  } else {
    badge.className  = 'distance-badge outside';
    text.textContent = `⚠️ Ofisdan ${Math.round(dist)} m uzoqda (ruxsat: ${r} m)`;
  }
}

function haversine(lat1, lon1, lat2, lon2) {
  const R    = 6371000;
  const phi1 = lat1 * Math.PI / 180;
  const phi2 = lat2 * Math.PI / 180;
  const dphi = (lat2 - lat1) * Math.PI / 180;
  const dlam = (lon2 - lon1) * Math.PI / 180;
  const a    = Math.sin(dphi/2)**2 + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dlam/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

// ═══════════════════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function setCheck(key, status, value) {
  const icon  = document.getElementById(`icon-${key}`);
  const val   = document.getElementById(`val-${key}`);
  const emojis = { loc: '📍', face: '👤', time: '🕐' };

  icon.textContent = emojis[key];
  val.textContent  = value || '';

  if (status === 'ok')   { icon.className = 'check-icon ok'; }
  else if (status === 'fail') { icon.className = 'check-icon fail'; }
  else                   { icon.className = 'check-icon'; }
}

function updateTime() {
  const now = new Date();
  const h   = String(now.getHours()).padStart(2, '0');
  const m   = String(now.getMinutes()).padStart(2, '0');
  const s   = String(now.getSeconds()).padStart(2, '0');
  setCheck('time', 'ok', `${h}:${m}:${s}`);
  document.getElementById('step-photo').className = 'step active';
}

function checkAllReady() {
  const locOk  = state.location !== null;
  const faceOk = state.faceScore >= FACE_THRESHOLD;
  document.getElementById('btn-submit').disabled = !(locOk && faceOk);
}

function formatTime(t) {
  if (!t) return '—';
  return t.slice(0, 5); // "HH:MM:SS" → "HH:MM"
}

function showFatalError(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display            = 'none';
  document.body.innerHTML += `
    <div class="card" style="margin-top:40px; text-align:center;">
      <div style="font-size:48px; margin-bottom:12px;">❌</div>
      <h2 style="margin-bottom:8px;">Xato</h2>
      <p style="color:var(--muted); font-size:14px;">${msg}</p>
      <button class="btn btn-secondary" style="margin-top:16px;" onclick="Telegram.WebApp.close()">Yopish</button>
    </div>`;
}

function showInlineError(msg) {
  const el      = document.getElementById('error-msg');
  el.style.display = 'block';
  el.className  = 'alert error';
  el.textContent = `⚠️ ${msg}`;
}

// ═══════════════════════════════════════════════════════════════════════════
// SUBMIT — tugma bosildi
// ═══════════════════════════════════════════════════════════════════════════
function onSubmitClick() {
  // Bugun allaqachon qayd etilganmi?
  if (state.alreadyDone && state.existingTime && !state.force) {
    const timeStr     = formatTime(state.existingTime);
    const now         = new Date();
    const newTime     = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const actionLabel = MODE === 'checkin' ? 'Kelish vaqti' : 'Ketish vaqti';

    document.getElementById('confirm-title').textContent = '⚠️ Qayta qayd etish';
    document.getElementById('confirm-msg').innerHTML =
      `Siz bugun allaqachon qayd etgansiz:<br><br>` +
      `📌 Mavjud <b>${actionLabel}</b>: <b>${timeStr}</b><br>` +
      `🔄 Yangi vaqt: <b>${newTime}</b><br><br>` +
      `Yangilasangiz, ${actionLabel.toLowerCase()}ngiz <b>${newTime}</b> bo'lib qoladi.`;

    document.getElementById('confirm-modal').style.display = 'flex';
    return;
  }

  doSubmit();
}

function closeConfirmModal() {
  document.getElementById('confirm-modal').style.display = 'none';
}

function confirmSubmit() {
  closeConfirmModal();
  state.force = true;
  doSubmit();
}

// ═══════════════════════════════════════════════════════════════════════════
// ACTUAL SUBMIT
// ═══════════════════════════════════════════════════════════════════════════
async function doSubmit() {
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Yuklanmoqda...';
  document.getElementById('error-msg').style.display = 'none';

  capturePhoto();
  stopCamera();

  const body = {
    init_data:    state.initData,
    photo_base64: state.photoBase64,
    latitude:     state.location?.latitude  || 0,
    longitude:    state.location?.longitude || 0,
    force:        state.force,
  };

  // Checkin uchun face_match_score ham kerak
  if (MODE === 'checkin') {
    body.face_match_score = state.faceScore;
  }

  try {
    const res  = await fetch(`${API_BASE}${CFG.apiPath}`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    const data = await res.json();

    if (!res.ok) {
      btn.disabled = false;
      btn.innerHTML = CFG.btnText;

      // Geofence xatosi → force confirm modal
      const detail = data.detail || '';
      if (!state.force && (detail.includes('uzoqdasiz') || detail.includes('radius'))) {
        const dist = state.distanceMeters ? `${Math.round(state.distanceMeters)} m` : '';
        const actionLabel = MODE === 'checkin' ? 'Kelish' : 'Ketish';
        document.getElementById('confirm-title').textContent = '📍 Ofisdan uzoqdasiz';
        document.getElementById('confirm-msg').innerHTML =
          `${dist ? `Siz ofisdan <b>${dist}</b> uzoqdasiz.<br><br>` : ''}` +
          `${actionLabel}ni shunga qaramay qayd etasizmi?`;
        document.getElementById('confirm-modal').style.display = 'flex';
        return;
      }

      showInlineError(detail || 'Xato yuz berdi');
      return;
    }

    showResult(data);
  } catch {
    btn.disabled = false;
    btn.innerHTML = CFG.btnText;
    showInlineError('Tarmoq xatosi. Internetni tekshiring');
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// NATIJA EKRANI
// ═══════════════════════════════════════════════════════════════════════════
function showResult(data) {
  document.getElementById('app').style.display = 'none';
  const screen = document.getElementById('result-screen');
  screen.style.display       = 'flex';
  screen.style.flexDirection = 'column';

  let icon, title, msg;

  if (MODE === 'checkin') {
    icon  = CFG.resIcon[data.status]  || '✅';
    title = CFG.resTitle[data.status] || 'Kelish qayd etildi!';
    const msgFn = CFG.resMsg[data.status];
    msg   = typeof msgFn === 'function' ? msgFn(data.late_minutes) : (msgFn || data.message);
  } else {
    icon  = '👋';
    title = 'Ketish qayd etildi!';
    msg   = `Ketish vaqti: ${data.check_out_time ? data.check_out_time.slice(0,5) : '—'}`;
  }

  document.getElementById('res-icon').textContent  = icon;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-msg').textContent   = msg;

  // Masofa
  const dist = data.distance_meters;
  if (dist !== null && dist !== undefined) {
    const radius  = state.employeeInfo?.branch?.radius_meters || 200;
    const distEl  = document.getElementById('res-distance');
    distEl.style.display = 'block';

    if (dist <= radius) {
      distEl.className = 'result-distance inside';
      distEl.textContent = `📍 Ofis qamrovida (${Math.round(dist)} m)`;
    } else {
      distEl.className = 'result-distance outside';
      distEl.textContent = `📍 Ofisdan ${Math.round(dist)} m uzoqda`;
    }
  }

  // Bonus (faqat checkin/holiday uchun)
  if (data.bonus_amount) {
    const bonusEl = document.getElementById('res-bonus');
    bonusEl.style.display = 'block';
    bonusEl.textContent   = `💰 Bonus: ${data.bonus_amount}`;
  }

  setTimeout(() => state.tg.close(), 3500);
}

// ═══════════════════════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════════════════════
init().catch(err => showFatalError(err.message));
</script>
